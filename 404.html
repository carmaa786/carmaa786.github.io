<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="robots" content="noindex, follow"/>
<title>Page Not Found (404) | Carmaa Car Care</title>
<meta name="description" content="The page you are looking for could not be found. Explore Carmaa's doorstep car wash, detailing and care services instead."/>
<link href="/assets/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180"/>
<link href="/assets/favicon-32.png" rel="icon" sizes="32x32" type="image/png"/>
<link href="/assets/favicon-16x16.png" rel="icon" sizes="16x16" type="image/png"/>
<link rel="stylesheet" href="/css/globalCss/navbarGlobal.min.css"/>
<link href="/css/common.min.css" rel="stylesheet"/>
<link href="/css/footer.min.css" rel="stylesheet"/>
<style>
  .nf-wrap{max-width:720px;margin:0 auto;padding:80px 20px;text-align:center;font-family:'Inter',sans-serif;color:#333;}
  .nf-code{font-family:'Oswald',sans-serif;font-size:5rem;font-weight:600;color:#1B4E9B;line-height:1;margin:0;}
  .nf-title{font-family:'Oswald',sans-serif;font-size:1.8rem;color:#1B4E9B;margin:.5rem 0 1rem;}
  .nf-text{font-size:1rem;line-height:1.6;color:#555;margin-bottom:2rem;}
  .nf-links{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
  .nf-links a{display:inline-block;padding:12px 22px;border-radius:10px;text-decoration:none;font-weight:600;}
  .nf-primary{background:#1B4E9B;color:#fff;}
  .nf-secondary{background:#f0f4fb;color:#1B4E9B;border:1px solid #d6e0f2;}
</style>
</head>
<body>
<div class="navbar-sticky-container" id="navbar-placeholder">
<script>
  document.addEventListener("DOMContentLoaded", function () {
    fetch("/components/navbar.html")
      .then((response) => response.text())
      .then((html) => {
        document.getElementById("navbar-placeholder").innerHTML = html;
        const toggle = document.getElementById("toggle");
        const menu = document.getElementById("menu");
        if (toggle) { toggle.addEventListener("click", function () { menu.classList.toggle("active"); }); }
      });
  });
</script>
</div>
<main class="nf-wrap">
  <p class="nf-code">404</p>
  <h1 class="nf-title">Page Not Found</h1>
  <p class="nf-text">Sorry, the page you were looking for doesn't exist or may have moved. Let's get you back on track.</p>
  <div class="nf-links">
    <a class="nf-primary" href="/">Go to Homepage</a>
    <a class="nf-secondary" href="/pricing/">View Pricing</a>
    <a class="nf-secondary" href="/blogs/">Read the Blog</a>
    <a class="nf-secondary" href="/contactus/">Contact Us</a>
  </div>
</main>
<div id="footer"></div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    fetch("/components/footer3.html")
      .then((response) => response.text())
      .then((html) => { document.getElementById("footer").innerHTML = html; })
      .catch((error) => console.error("Error loading footer:", error));
  });
</script>
<script defer="" src="/script.js"></script>
</body>
</html>
