<link rel="stylesheet" href="/css/footer.min.css" />
<style>
    .wave {
        --size: 50px;
        --m: 2;
        --p: calc(var(--m)*var(--size));
        --R: calc(var(--size)*sqrt(var(--m)*var(--m) + 1));
        padding-top: 50px;
        mask:
            radial-gradient(var(--R) at left 50% top calc(var(--size) + var(--p)), #000 99%, #0000 101%) calc(50% - 2 * var(--size)) 0/calc(4 * var(--size)) 100%,
            radial-gradient(var(--R) at left 50% top calc(-1 * var(--p)), #0000 99%, #000 101%) left 50% top var(--size) / calc(4 * var(--size)) 100% repeat-x;
    }

    .footer-container-div {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
    }

    .footer a,
    .footer a:hover,
    .footer a:visited,
    .footer a *,
    .footer a:hover *,
    .footer a:visited * {
        text-decoration: none !important;
    }

    .logo-img-container {
        width: 120px;
        margin-bottom: 16px;
    }

    .footer-logo-img {
        width: 100%;
        height: auto;
        display: block;
    }

    .links-main-container {
        display: flex;
        align-items: baseline;
        padding-top: 20px;
        justify-content: space-between;
        padding-bottom: 1.5rem;
    }

    @media (max-width: 768px) {
        .links-main-container {
            flex-direction: column !important;
            gap: 24px !important;
            padding-top: 16px !important;
            padding-bottom: 16px !important;
        }
    }

    .footer {
        padding-top: 35px;
        padding-bottom: 35px;
    }

    .link-section-child {
        display: flex;
        flex-direction: column;
    }

    .link-section-child p {
        font-size: 16px;
        padding-bottom: 5px;
        font-weight: 500;
    }

    /* Footer column headings: keep a consistent, deliberate size
       (these use <h3> for a valid heading order on the page). */
    .footer-container-div h3 {
        font-size: 18px;
        font-weight: 700;
        margin: 0 0 8px;
        line-height: 1.3;
    }

    .footer-link {
        font-size: 14px;
    }

    .fa-color {
        color: #28b097;
        font-size: 2rem;
    }

    .social-media-icons {
        display: flex !important;
        flex-direction: row !important; /* Ensure horizontal on mobile */
        gap: 15px !important;
        margin-top: 15px;
        align-items: center;
        flex-wrap: nowrap !important; /* Prevent wrapping on mobile */
    }

    .img-wrapper {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s ease;
    }

    .img-wrapper:hover {
        transform: scale(1.1);
    }

    .img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .google-play-store-icons {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        align-items: center;
        flex-wrap: wrap;
    }

    @media (max-width: 480px) {
        .google-play-store-icons {
            flex-direction: column !important;
            align-items: flex-start !important;
            gap: 8px !important;
        }

        .download-btn-footer {
            width: 150px !important;
        }
    }

    .download-btn-footer {
        width: 130px;
        cursor: pointer;
    }

    .download-btn-footer img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 10px;
        transition: transform 0.2s ease-in-out;
    }

    .download-btn-footer img:hover {
        transform: scale(1.05);
    }

    @media (max-width: 900px) {
        .links-main-container {
            flex-direction: row; /* Keep horizontal where possible */
            flex-wrap: wrap;
            gap: 30px;
            justify-content: space-between;
        }

        .link-section-child {
            width: auto;
            min-width: 150px;
        }

        .footer-logo-container {
            text-align: left;
        }

        @media (max-width: 768px) {
            .link-section-container {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: wrap !important;
                gap: 6px 12px !important;
                width: 100% !important;
            }

            .link-section-container a {
                flex: 0 0 auto !important;
                white-space: nowrap !important;
            }

            .link-section-container .footer-dehradun {
                font-size: 13px !important;
                margin-bottom: 2px !important;
            }
        }
    }

    /* === Mobile footer alignment fix — keep every section consistently
       left-aligned, full width, with even spacing === */
    @media (max-width: 768px) {
        .footer .footer-container-div {
            padding-left: 20px !important;
            padding-right: 20px !important;
        }
        .footer .footer-logo-container {
            text-align: left !important;
        }
        .footer .links-main-container {
            flex-direction: column !important;
            align-items: flex-start !important;
            gap: 28px !important;
        }
        .footer .support-email-container,
        .footer .link-section-child,
        .footer .link-section-child-container,
        .footer .link-section-main-container {
            width: 100% !important;
            text-align: left !important;
            align-items: flex-start !important;
        }
        .footer .link-section-container {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: wrap !important;
            gap: 8px 20px !important;
        }
        .footer .social-media-icons,
        .footer .google-play-store-icons {
            justify-content: flex-start !important;
        }
        .footer .follow-us {
            margin-top: 8px !important;
        }
    }

    @keyframes fadeInNavbar {
        to { opacity: 1; }
    }
</style>
